  # ===== 命令直通车 (Command Bar) 示例 =====
  # 触发码统一用 co 前缀, 后续字母全部用字母 (不含数字), 因为五笔/拼音
  # 输入数字会立刻选词, 数字键到不了 phrase 查询。
  # 文档: docs/design/command-bar-design.md
  #
  # ⚠️ 短语精确码触发, 输入码偏移即脱离命中, 不存在"prefix 命中后追加输入"。
  # 所以 code() / tail(code, n) / calc(tail(code, n)) 等"依赖动态输入"的函数
  # 在短语场景实际无意义 — 已从示例中移除。需要"算式"功能请用 cohj 打开计算器,
  # 需要"取上次上屏"用 last(n)。

  # --- 打开 URL / 运行程序 ---
  - code: "cobd"
    text: '$CC("打开百度", open("https://baidu.com"))'
    weight: 2000
  - code: "cozd"
    text: '$CC("汉典:{last(1)}", open("https://www.zdic.net/hans/{url(last(1))}"))'
    weight: 2000
  # 启动程序 / 用户主目录在 Windows / macOS 上目标不同, 按 platform 分别提供
  # (ParsePhraseYAMLFile 按 runtime.GOOS 过滤, 同 code 只保留匹配当前平台那条)。
  - code: "cono"
    text: '$CC("打开记事本", proc.run("notepad.exe"))'
    weight: 2000
    platform: windows
  - code: "cono"
    text: '$CC("打开文本编辑", proc.run("open", "-a", "TextEdit"))'
    weight: 2000
    platform: darwin
  - code: "coca"
    text: '$CC("打开计算器", proc.run("calc.exe"))'
    weight: 2000
    platform: windows
  - code: "coca"
    text: '$CC("打开计算器", proc.run("open", "-a", "Calculator"))'
    weight: 2000
    platform: darwin
  - code: "cohm"
    text: '$CC("打开用户主目录", open(env("USERPROFILE")))'
    weight: 2000
    platform: windows
  - code: "cohm"
    text: '$CC("打开用户主目录", open(env("HOME")))'
    weight: 2000
    platform: darwin

  # --- 文本上屏 ---
  - code: "coll"
    text: '$CC(last(), type(last()))'
    weight: 2000
  - code: "copa"
    text: '$CC("粘贴", clip.paste())'
    weight: 2000

  # --- type + key.tap/seq 组合: 配对符号 + 删行 ---
  - code: "cojk"
    text: '$CC("「」", type("「」"), key.tap("Left"))'
    weight: 2000
  # 删行: Windows 用 Home/Shift+End/Backspace; macOS 这些键在 Cocoa 文本框是
  # 滚动而非移动光标, 改用 emacs 绑定 Ctrl+A(行首)/Ctrl+K(删到行尾), 几乎所有
  # Cocoa 文本框都支持。
  - code: "codl"
    text: '$CC("[删行]", key.seq("Home", "Shift+End", "Backspace"))'
    weight: 2000
    platform: windows
  - code: "codl"
    text: '$CC("[删行]", key.seq("Ctrl+A", "Ctrl+K"))'
    weight: 2000
    platform: darwin

  # --- 剪贴板 / 加词 ---
  - code: "cocp"
    text: '$CC("复制时间", clip.copy(now()))'
    weight: 2000
  - code: "coad"
    text: '$CC("剪贴板加词:{clip()}", dict.add(clip()))'
    weight: 2000

  # --- IME 自身切换 (工具栏可能隐藏时的高效切换方式, 无焦点切换) ---
  - code: "coen"
    text: '$CC("切中英", ime.toggle("cn-en"))'
    weight: 2000
  - code: "cofs"
    text: '$CC("切全半角", ime.toggle("fullshape"))'
    weight: 2000
  - code: "coly"
    text: '$CC("切横纵候选", ime.toggle("layout"))'
    weight: 2000
  - code: "cocw"
    text: '$CC("切候选窗", ime.toggle("candwin"))'
    weight: 2000
  - code: "coss"
    text: '$CC("打开设置", setting.open(""))'
    weight: 2000
    position: 1
  - code: "coss"
    text: '$CC("设置(Web)", setting.web(""))'
    weight: 2000
    position: 2
  - code: "cost"
    text: '$CC("切简繁", ime.toggle("s2t"))'
    weight: 2000
  - code: "copm"
    text: '$CC("切编码模式", ime.toggle("preedit"))'
    weight: 2000
  - code: "cotb"
    text: '$CC("切工具栏", ime.toggle("toolbar"))'
    weight: 2000
  - code: "cots"
    text: '$CC("切主题", ime.theme_cycle())'
    weight: 2000
