# WindInput 系统短语
# 随程序打包发布，用户不应直接修改此文件
# 文本中的 $变量 会在运行时自动展开
# 支持 $var 和 ${var} 两种语法，$$ 转义为 $
#
# 权重字段 (2026-05-16 修订):
#   weight: 0~10000, 短语 tier 内的排序权重; 未设置时默认 1000 (中位)
#   档位参考: 必置顶 8000~10000 / 高频 4000~7000 / 中位 1000 (默认) / 罕用 200~500 / 禁用 0
#   position: 仅在同 code 多条短语 sort 时做 tie-break (升序); 不再参与 weight 计算
#
# 本文件内置权重分级 (按用户主动触发度排序):
#   co* (命令直通车)        → 2000  用户记忆触发码主动调用
#   date/time/zzrq/zzsj/... → 1000  日期时间常用快捷 (同 code 多条用 position tie-break)
#   zz* (字符组首选)         → 1010~1230 区间, 每组独占一档 10 递减, 决定 prefix-nav (输入 zz)
#                              时的顺序; 同 code 备选保持 800 (position>=2)。
#   position 字段:
#     - 仅在同 code 多条短语下做 tie-break (例如 date 的 5 条不同模板);
#     - 跨 code 单条短语不写 position, 排序由 weight + LoadSeq 决定。
#
# 详见 docs/design/command-bar-design.md §3.8

phrases:
  # ===== 日期 =====
  - code: "date"
    text: "$Y年$M月$D日"
    weight: 1000
    position: 1
  - code: "date"
    text: "$Y-$MM-$DD"
    weight: 800
    position: 2
  - code: "date"
    text: "$Y.$MM.$DD"
    weight: 800
    position: 3
  - code: "date"
    text: "$Y/$MM/$DD"
    weight: 800
    position: 4
  - code: "date"
    text: "${YC}年${MC}月${DC}日"
    weight: 800
    position: 5

  # ===== 时间 =====
  - code: "time"
    text: "$HH:$mm:$ss"
    weight: 1000
    position: 1
  - code: "time"
    text: "$HH:$mm"
    weight: 800
    position: 2
  - code: "time"
    text: "$HH时$mm分$ss秒"
    weight: 800
    position: 3

  # ===== 日期时间 =====
  - code: "datm"
    text: "$Y年$M月$D日 $HH:$mm:$ss"
    weight: 1000
    position: 1
  - code: "datm"
    text: "$Y-$MM-$DD $HH:$mm:$ss"
    weight: 800
    position: 2
  - code: "datm"
    text: "${YC}年${MC}月${DC}日 $HH:$mm:$ss"
    weight: 800
    position: 3

  # ===== 星期 =====
  - code: "week"
    text: "星期$WC"
    weight: 1000
    position: 1
  - code: "week"
    text: "周$WC"
    weight: 800
    position: 2
  - code: "week"
    text: "$Y年$M月$D日 星期$WC"
    weight: 800
    position: 3
  - code: "week"
    text: "$Y年$M月$D日 周$WC"
    weight: 800
    position: 4

  # ===== UUID =====
  - code: "uuid"
    text: "$uuid"
    weight: 1000

  # ===== 时间戳 =====
  - code: "tmts"
    text: "$ts"
    weight: 800
    position: 2
  - code: "tmts"
    text: "$tsms"
    weight: 800
    position: 3

