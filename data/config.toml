# WindInput 系统预置配置（v1 结构，见 docs/design/config-restructure.md §3）
# 此文件为应用内置默认配置，随程序安装包分发。
# 加载优先级：代码默认值（Layer 1）→ 本文件（Layer 2）→ 用户配置
# （%APPDATA%\WindInput\config.toml，Layer 3）。
# 修改此文件可调整新安装或新版本升级后的默认行为，无需重新编译。
#
# 注意：本文件不写 version 键——version 是用户文件的迁移状态锚点。

[general]
remember_last_state = false
default_chinese_mode = true
default_full_width = false
default_chinese_punct = true

[schema]
active = "wubi86"
available = ["wubi86", "wubi86_pinyin"]

[hotkeys]
toggle_mode_keys = ["lshift", "rshift"]
commit_on_switch = true
switch_engine = "ctrl+shift+e"
toggle_full_width = "shift+space"
toggle_punct = "ctrl+."
delete_candidate = "ctrl+shift+number"
pin_candidate = "ctrl+number"
toggle_toolbar = 'ctrl+shift+\'
open_settings = "ctrl+shift+]"
add_word = "ctrl+equal"
open_add_word_dialog = "none"
toggle_s2t = "ctrl+shift+j"
take_screenshot = "ctrl+shift+f11"
activate_ime = "ctrl+shift+["
global_hotkeys = []

[input]
punct_follow_mode = false
filter_mode = "smart"
select_key_groups = ["semicolon_quote"]
page_keys = ["pageupdown", "minus_equal"]
highlight_keys = ["arrows", "tab"]
select_char_keys = []
smart_punct_after_digit = true
smart_punct_list = ".,:"
smart_symbol_mode = false
smart_symbol_timeout_ms = 500
smart_symbol_chars = "。，？！：；、～￥·……——"
enter_behavior = "commit"
space_on_empty_behavior = "commit"
numpad_behavior = "direct"
pinyin_separator = "auto"

[input.shift_temp_english]
enabled = true
show_english_candidates = true
shift_behavior = "temp_english"
allow_symbols = false
space_as_input = false

[input.capslock]
cancel_on_mode_switch = false

[input.temp_pinyin]
trigger_keys = ["backtick"]
z_include_on_commit = true
accent_color = ""

[input.auto_pair]
chinese = false
english = false

[input.overflow]
number_key = "ignore"
select_key = "ignore"
select_char_key = "ignore"

[input.phrase]
min_prefix_length = 2

# URL 临时输入模式：正常输入下打出完整前缀（如 http / www.）即进入网址输入模式，
# 模式内自由输入网址字符（不触发上屏），空格或回车上屏。默认关闭。
[input.url_input]
enabled = false
prefixes = ["www.", "http", "https", "ftp."]
accent_color = ""

[ui.candidate]
font_size = 18
font_size_follow_theme = true
per_page = 7
per_page_extended = 0
max_chars = 16
layout = "horizontal"
inline_preedit = true
preedit_mode = "top"
flip_when_above = false
hide_window = false
index_labels = ""
mode_accent_border = false
always_show_pager = false
always_show_pager_follow_theme = true
show_page_number = true
show_page_number_follow_theme = true
vertical_max_width = 600
vertical_max_width_follow_theme = true
pager_bar_display = ""
page_number_display = ""

[ui.font]
family = ""
path = ""
render_mode = "directwrite"
gdi_weight = 500
gdi_scale = 1.0
menu_weight = 500
menu_size = 12.0

[ui.theme]
name = "default"
style = "system"
editor_auto_start = false

[ui.status_indicator]
enabled = true
duration = 800
display_mode = "temp"
schema_name_style = "full"
show_mode = true
show_punct = true
show_full_width = false
position_mode = "follow_caret"
offset_x = 0
offset_y = 0
custom_x = 0
custom_y = 0
font_size = 18.0
opacity = 0.9
background_color = ""
text_color = ""
border_radius = 6.0

[ui.tooltip]
delay = 200

[ui.tooltip.code]
enabled = true

[ui.tooltip.pinyin]
enabled = true
heteronyms = true
max_readings = 0

[ui.tooltip.chaizi]
enabled = false

[ui.tooltip.debug]
enabled = false

[ui.toolbar]
visible = true
hide_in_fullscreen = true

[features.stats]
enabled = true
retain_days = 0
track_english = true

[features.s2t]
enabled = false
variant = "s2t"

[features.quick_input]
trigger_keys = ["semicolon"]
force_vertical = true
decimal_places = 6
accent_color = ""

[features.quick_input.alpha_providers]
pinyin = true
rare_char = false
rare_char_id = ""
english = false

[features.cmdbar]
candidate_prefix = "⚡"

[compat]
host_render_processes = ["SearchHost.exe"]

[debug]
log_level = "info"
perf_sampling = false
