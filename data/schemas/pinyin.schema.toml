[schema]
id = "pinyin"
name = "全拼"
icon_label = "拼"
version = "1.0"
author = "内置"
description = "全拼输入方案"

[engine]
type = "pinyin"
filter_mode = "smart"

[engine.pinyin]
scheme = "full"
show_code_hint = true
use_smart_compose = true
candidate_order = "smart"

[engine.pinyin.fuzzy]
enabled = false

[[dictionaries]]
id = "pinyin_main"
path = "pinyin/rime_frost.dict.yaml"
type = "rime_pinyin"
default = true

[dictionaries.weight_spec]
median = 200
max = 19260817
mode = "log"

[learning]
unigram_path = "pinyin/unigram.txt"
temp_max_entries = 5000
temp_promote_count = 0

[learning.auto_learn]
enabled = false

[learning.freq]
enabled = false
