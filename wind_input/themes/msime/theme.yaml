meta:
  name: "微软风格"
  version: "3.0"
  author: "清风输入法"
  order: 1

# v3-C schema: base 单链继承唯一基础主题 _base。msime 仅微调主色（微软蓝）+ 紧凑几何 + 文本序号 + 强调条。
# 其余颜色（border/selection/text/toolbar 等）继承 _base 清风蓝色系。
base: _base

# v3 行为配置（P6）：可被用户 ui.pager_display_mode 覆盖。
behavior:
  always_show_pager: false   # 仅 1 页时不显示翻页区
  show_page_number: true     # 多页时显示 "1/3" 页码文字

colors:
  primary: "#0078D4"            # 微软蓝（base 其余清风蓝色继承）

views:
  item:
    padding: {top: 6, right: 8, bottom: 6, left: 8}   # msime 紧凑
  index:
    color: "#888888"            # 灰色文本序号
    font_size: 2
  comment:
    font_size: -2
  footer_bar:
    font_size: -2
  accent_bar:
    enabled: true               # msime 选中强调条
    width: 3
