meta:
  name: "微软风格"
  version: "2.5"
  author: "清风输入法"
  order: 1

# v2.5 schema: msime 走数字 + accent bar 风格
layout: msime-tight
palette: msime-classic

# v2.6 行为配置（P6）：可被用户 ui.pager_display_mode 覆盖。
# 不声明 font_size / vertical_max_width → 沿用引擎基线 + 用户全局配置。
behavior:
  always_show_pager: false   # 仅 1 页时不显示翻页区
  show_page_number: true     # 多页时显示 "1/3" 页码文字

# v2.6 盒模型 View 外观（P2 切片-2）：与 msime-tight/msime-classic 现状一致，仅显式字段覆盖
# 合成桥基线。颜色用 ${语义} token 解析自 palette；字号沿用用户配置；序号走 text 模式（layout circle:false）。
views:
  window:
    padding: {top: 6, right: 8, bottom: 6, left: 8}
    border: {radius: 8, width: 1px, color: "${border}"}   # 1px 发丝线：边框不随 DPI 加粗（匹配旧渲染器）
    background: {color: "${background}"}
  preedit_bar:
    padding: {left: 8, right: 8}
    background: {color: "${preedit_bg}"}
    color: "${preedit_text}"
  item:
    padding: {left: 8, right: 8}
    border: {radius: 4}
    selected: {background: {color: "${selected_bg}"}}
    hover: {background: {color: "${hover_bg}"}}
  index:
    color: "${index_text}"
    font_size: 2                                   # 文本序号醒目大号(主候选+2)
  text:
    margin: {left: 4}
    color: "${text}"
  comment:
    margin: {left: 5}
    color: "${comment}"
    font_size: -2                                  # 注释(主候选-2)
  footer_bar:
    font_size: -2                                  # 页码/翻页字号(主候选-2)
  accent_bar:
    background: {color: "${accent}"}
  metrics:
    item_spacing: 16   # 文本序号模式间距（旧合成桥 12+4 magic 下沉，显式声明）
    accent_bar:
      enabled: true
      width: 3
  status:
    background: {color: "${background}"}
    color: "${text}"
  tooltip:
    background: {color: "${background}"}
    color: "${text}"
  toolbar:
    background: {color: "${background}"}
    border: {color: "${border}"}
    grip: {color: "${grip}"}
    button:
      background: {color: "${button_bg}"}
      color: "${button_text}"
      mode:
        chinese: {background: {color: "${mode_cn_bg}"}}
        english: {background: {color: "${mode_en_bg}"}}
    settings:
      icon: {color: "${settings_icon}"}
      hole: {color: "${settings_hole}"}
  menu:
    background: {color: "${background}"}
    border: {color: "${border}"}
    color: "${text}"
    separator: {color: "${separator}"}
    disabled: "${disabled}"
    hover:
      background: {color: "${hover_bg}"}
      color: "${hover_text}"
