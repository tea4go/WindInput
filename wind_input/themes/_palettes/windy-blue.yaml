meta:
  name: "清风蓝"
  version: "1.0"

primary: "#4285F4"

derive:
  enabled: true
  algorithm: hsl-shift

light:
  bg: "#FFFFFF"
  surface: "#F0F0F0"
  border: "#C8C8C8"
  text: "#1E1E1E"
  text_dim: "#646464"
  text_hint: "#969696"
  accent: "${primary}"
  on_accent: "#FFFFFF"
  shadow: "#0000000F"

  candidate_window:
    background:    "${bg}"
    border:        "${border}"
    text:          "${text}"
    comment:       "${text_hint}"
    index_bg:      "${accent}"
    index_text:    "${on_accent}"
    hover_bg:      "#E6F0FF"
    selected_bg:   "#E6F0FF"
    selected_text: "${text}"
    preedit_bg:    "${surface}"
    preedit_text:  "${text_dim}"

  toolbar:
    background:          "${bg}"
    border:              "#C7D1E0"
    grip:                "#99ADC7B3"
    mode_chinese_bg:     "#339AF5"
    mode_english_bg:     "#737F94"
    mode_text:           "${on_accent}"
    full_width_on_bg:    "#2EB899"
    full_width_off_bg:   "#E6EAEF"
    full_width_on_text:  "#FFFFFF"
    full_width_off_text: "#59667A"
    punct_chinese_bg:    "#F58543"
    punct_english_bg:    "#E6EAEF"
    punct_chinese_text:  "#FFFFFF"
    punct_english_text:  "#59667A"
    settings_bg:         "#E6EAEF"
    settings_icon:       "#7A66B8"
    settings_hole:       "#E6EAEF"

  popup_menu:
    background: "${bg}"
    border:     "#C7C7C7"
    text:       "${text}"
    disabled:   "#A1A1A1"
    hover_bg:   "#0078D4"
    hover_text: "${on_accent}"
    separator:  "#DBDBDB"

  tooltip:
    background: "#3C3C3CF0"
    text:       "#FFFFFF"

  status:
    background: "${bg}"
    border:     "${accent}"
    text:       "${text}"

  toast:
    background: "#323232E6"
    text:       "#FFFFFF"

dark:
  bg: "#2D2D2D"
  surface: "#3A3A3A"
  border: "#404040"
  text: "#E0E0E0"
  text_dim: "#B0B0B0"
  text_hint: "#808080"
  accent: "${primary}"
  on_accent: "#FFFFFF"
  shadow: "#0000001A"

  candidate_window:
    background:    "${bg}"
    border:        "${border}"
    text:          "${text}"
    comment:       "${text_hint}"
    index_bg:      "${accent}"
    index_text:    "${on_accent}"
    hover_bg:      "#3D4A5C"
    selected_bg:   "#3D4A5C"
    selected_text: "${text}"
    preedit_bg:    "${surface}"
    preedit_text:  "${text_dim}"

  toolbar:
    background:          "${bg}"
    border:              "${border}"
    grip:                "#5A5A5AB3"
    mode_chinese_bg:     "#339AF5"
    mode_english_bg:     "#5A5A5A"
    mode_text:           "${on_accent}"
    full_width_on_bg:    "#2EB899"
    full_width_off_bg:   "${border}"
    full_width_on_text:  "#FFFFFF"
    full_width_off_text: "${text_dim}"
    punct_chinese_bg:    "#F58543"
    punct_english_bg:    "${border}"
    punct_chinese_text:  "#FFFFFF"
    punct_english_text:  "${text_dim}"
    settings_bg:         "${border}"
    settings_icon:       "#9B8CCE"
    settings_hole:       "${border}"

  popup_menu:
    background: "${bg}"
    border:     "${border}"
    text:       "${text}"
    disabled:   "#707070"
    hover_bg:   "#0078D4"
    hover_text: "${on_accent}"
    separator:  "${border}"

  tooltip:
    background: "#1E1E1EF0"
    text:       "${text}"

  status:
    background: "${bg}"
    border:     "${accent}"
    text:       "${text}"

  toast:
    background: "#1E1E1EE6"
    text:       "${text}"
