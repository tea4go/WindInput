meta:
  name: "微软经典"
  version: "1.0"

primary: "#0078D4"

derive:
  enabled: true
  algorithm: hsl-shift

light:
  bg: "#FFFFFF"
  surface: "#F0F0F0"
  border: "#E5E5E5"
  text: "#1A1A1A"
  text_dim: "#666666"
  text_hint: "#999999"
  accent: "${primary}"
  on_accent: "#FFFFFF"
  shadow: "#00000008"

  candidate_window:
    background:    "${bg}"
    border:        "${border}"
    text:          "${text}"
    comment:       "${text_hint}"
    index_bg:      "${accent}"
    index_text:    "#888888"
    accent_bar:    "${accent}"
    hover_bg:      "#F0F0F0"
    selected_bg:   "#F0F0F0"
    selected_text: "${text}"
    preedit_bg:    "#F5F5F5"
    preedit_text:  "${text_dim}"

  toolbar:
    background:          "${bg}"
    border:              "#E0E0E0"
    grip:                "#C0C0C0B3"
    mode_chinese_bg:     "${accent}"
    mode_english_bg:     "#8A8A8A"
    mode_text:           "${on_accent}"
    full_width_on_bg:    "${accent}"
    full_width_off_bg:   "${surface}"
    full_width_on_text:  "#FFFFFF"
    full_width_off_text: "${text_dim}"
    punct_chinese_bg:    "${accent}"
    punct_english_bg:    "${surface}"
    punct_chinese_text:  "#FFFFFF"
    punct_english_text:  "${text_dim}"
    settings_bg:         "${surface}"
    settings_icon:       "${text_dim}"
    settings_hole:       "${surface}"

  popup_menu:
    background: "${bg}"
    border:     "${border}"
    text:       "${text}"
    disabled:   "#A1A1A1"
    hover_bg:   "${accent}"
    hover_text: "${on_accent}"
    separator:  "#DBDBDB"

  tooltip:
    background: "#3C3C3CF0"
    text:       "#FFFFFF"

  status:
    background: "${bg}"
    border:     "${accent}"
    text:       "${text}"

  toast:
    background: "#323232E6"
    text:       "#FFFFFF"

dark:
  bg: "#2D2D2D"
  surface: "#3A3A3A"
  border: "#404040"
  text: "#E0E0E0"
  text_dim: "#B0B0B0"
  text_hint: "#808080"
  accent: "${primary}"
  on_accent: "#FFFFFF"
  shadow: "#0000001A"

  candidate_window:
    background:    "${bg}"
    border:        "${border}"
    text:          "${text}"
    comment:       "${text_hint}"
    index_bg:      "${accent}"
    index_text:    "#888888"
    accent_bar:    "${accent}"
    hover_bg:      "#3D4A5C"
    selected_bg:   "#3D4A5C"
    selected_text: "${text}"
    preedit_bg:    "${surface}"
    preedit_text:  "${text_dim}"

  toolbar:
    background:          "${bg}"
    border:              "${border}"
    grip:                "#5A5A5AB3"
    mode_chinese_bg:     "${accent}"
    mode_english_bg:     "#5A5A5A"
    mode_text:           "${on_accent}"
    full_width_on_bg:    "${accent}"
    full_width_off_bg:   "${border}"
    full_width_on_text:  "#FFFFFF"
    full_width_off_text: "${text_dim}"
    punct_chinese_bg:    "${accent}"
    punct_english_bg:    "${border}"
    punct_chinese_text:  "#FFFFFF"
    punct_english_text:  "${text_dim}"
    settings_bg:         "${border}"
    settings_icon:       "#9B8CCE"
    settings_hole:       "${border}"

  popup_menu:
    background: "${bg}"
    border:     "${border}"
    text:       "${text}"
    disabled:   "#707070"
    hover_bg:   "${accent}"
    hover_text: "${on_accent}"
    separator:  "${border}"

  tooltip:
    background: "#1E1E1EF0"
    text:       "${text}"

  status:
    background: "${bg}"
    border:     "${accent}"
    text:       "${text}"

  toast:
    background: "#1E1E1EE6"
    text:       "${text}"
