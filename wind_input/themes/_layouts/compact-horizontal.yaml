meta:
  name: "紧凑横排"
  version: "1.0"

density: compact
scale: 1.0

# P7-5：候选窗几何/序号/强调条/行高已迁主题 views/behavior，layout 不再承载候选窗。
# 此文件仅描述其它窗口（toolbar/status/tooltip/popup_menu/toast）的尺寸。

toolbar:
  height: 28
  padding: {top: 4, right: 6, bottom: 4, left: 6}
  item_gap: 4

status:
  border_width: 2
  padding: {top: 4, right: 8, bottom: 4, left: 8}

tooltip:
  padding: {top: 4, right: 8, bottom: 4, left: 8}
  font_size: 12
  border_radius: 4
  max_width: 320

popup_menu:
  item_padding: {top: 4, right: 12, bottom: 4, left: 12}
  item_height: 24
  separator_height: 1

toast:
  padding: {top: 8, right: 12, bottom: 8, left: 12}
  font_size: 13
  border_radius: 8
  max_width: 280
