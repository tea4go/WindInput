meta:
  name: "微软紧凑横排"
  version: "1.0"

# 与 compact-horizontal 类似但 index 走 "text" 模板（数字 + accent bar），
# 整体内边距更紧、字号略小
density: compact
scale: 1.0

candidate_window:
  window_padding: {top: 6, right: 8, bottom: 6, left: 8}
  band_gap: 2
  border_width: 1
  border_radius: 4

  preedit_bar:
    visible: true
    padding: {top: 4, right: 8, bottom: 2, left: 8}
    font_size: 14

  candidate_list:
    item_padding: {top: 4, right: 8, bottom: 4, left: 8}
    item_gap: 0
    item_height: 0
    item_radius: 2
    index:
      labels: ["1", "2", "3", "4", "5", "6", "7", "8", "9", "0"]
      circle: false
      gap: 4
      min_width: 14
      font_size: 12
    text:
      font_size: 14
    comment:
      visible: true
      font_size: 12
      gap: 5
      placement: inline
    accent_bar:
      enabled: true
      width: 3

  footer_bar:
    visible: true
    padding: {top: 2, right: 8, bottom: 4, left: 8}
    font_size: 11

toolbar:
  height: 28
  padding: {top: 4, right: 6, bottom: 4, left: 6}
  item_gap: 4

status:
  border_width: 2
  padding: {top: 4, right: 8, bottom: 4, left: 8}

tooltip:
  padding: {top: 4, right: 8, bottom: 4, left: 8}
  font_size: 12
  border_radius: 4
  max_width: 320

popup_menu:
  item_padding: {top: 4, right: 12, bottom: 4, left: 12}
  item_height: 24
  separator_height: 1

toast:
  padding: {top: 8, right: 12, bottom: 8, left: 12}
  font_size: 13
  border_radius: 8
  max_width: 280
