meta:
  name: "极点经典(位图)"
  version: "2.6"
  author: "清风输入法"
  order: 2

# P7-C 验收样例：以九宫格背景图为主体的位图皮肤。
# 复用 compact-horizontal 布局（其它窗口）+ windy-blue 调色板；核心在 views.window.background.image。
# 背景图 panel.png 由 tools 生成（64x64：2px 蓝边 + 浅蓝竖向渐变，slice=8 保四角清晰）。
layout: compact-horizontal
palette: windy-blue

# 顶层资源注册表（P7-C / D5）：名→路径（相对 theme.yaml），views 里按 ref 引用。
resources:
  # P7-E：{light,dark} 双变体——切系统暗色时自动换深色版位图（与 palette 双变体对称）。
  panel: {light: "panel.png", dark: "panel-dark.png"} # 九宫格背景填充
  sel: {light: "sel.png", dark: "sel-dark.png"}       # 选中态高亮渐变图（P7-D）
  mark: "mark.png"                                     # 角标水印（单图明暗共用）

views:
  window:
    # 九宫格背景图：纯渐变填充，四角随 slice 保持原样、四边/中心拉伸贴合候选窗尺寸。
    # 边框/圆角由 View 提供（引擎裁剪），位图只负责填充——避免硬边被圆角裁出缺角。
    background:
      color: "${background}" # 图加载失败时的兜底底色
      image:
        ref: panel
        mode: nine_slice
        slice: {top: 8, right: 8, bottom: 8, left: 8}
    border: {radius: 8, width: 1, color: "${border}"} # 引擎画圆角边框，位图渐变裁进其内
    padding: {top: 8, right: 10, bottom: 8, left: 10}
    # 装饰层（P7-C2 / D4）：右下角半透明水印，z>0 覆盖在内容之上。
    # 注意 offset 是屏幕平移(+x 右/+y 下)：bottom-right 锚点要内缩须用负偏移。
    layers:
      - {ref: mark, z: 1, anchor: bottom-right, offset: {x: -8, y: -6}, size: {w: 20, h: 20}, opacity: 0.9}
  preedit_bar:
    padding: {left: 8, right: 8}
    background: {color: "transparent"} # 透明：让窗口背景图从上到下整窗透出（位图皮肤验收）
    color: "${preedit_text}"
  item:
    padding: {left: 8, right: 10}
    border: {radius: 4}
    # P7-D：选中态铺高亮渐变位图（被 item 圆角裁剪）+ 白色加粗文字（整行统一）。
    # 位图加载失败时 color 作兜底底色。
    selected:
      background:
        color: "${selected_bg}"
        image: {ref: sel, mode: stretch}
      color: "#FFFFFF"
      font_weight: 600
    hover: {background: {color: "${hover_bg}"}}
  index:
    color: "${index_text}"
    background: {color: "${index_bg}", shape: none} # 极点风格：纯数字序号，无圆背景
  text:
    margin: {left: 4}
    color: "${text}"
  comment:
    margin: {left: 6}
    color: "${comment}"
  accent_bar:
    background: {color: "${accent}"}
  metrics:
    accent_bar: {enabled: true, width: 3} # 选中候选左侧蓝色强调条
    # P7-E 结构化阴影：offset_x/y + color 已实现（blur 预留、暂不渲染）。
    shadow: {offset_x: 3, offset_y: 4, blur: 8, color: "${shadow}"}
  status:
    background: {color: "${background}"}
    color: "${text}"
  tooltip:
    background: {color: "${background}"}
    color: "${text}"
  toolbar:
    background: {color: "${background}"}
    border: {color: "${border}"}
    grip: {color: "${grip}"}
    button:
      background: {color: "${button_bg}"}
      color: "${button_text}"
      mode:
        chinese: {background: {color: "${mode_cn_bg}"}}
        english: {background: {color: "${mode_en_bg}"}}
    settings:
      icon: {color: "${settings_icon}"}
      hole: {color: "${settings_hole}"}
  menu:
    background: {color: "${background}"}
    border: {color: "${border}"}
    color: "${text}"
    separator: {color: "${separator}"}
    disabled: "${disabled}"
    hover:
      background: {color: "${hover_bg}"}
      color: "${hover_text}"
